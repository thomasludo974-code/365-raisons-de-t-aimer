*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--deep);
  min-height: 100vh;
  font-family: 'Cormorant Garamond', serif;
  color: var(--cream);
  overflow-x: hidden;
}

/* Stars */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star  { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d,3s) ease-in-out infinite alternate; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

/* Main */
.wrap { position: relative; z-index: 10; max-width: 480px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }

/* Header */
.site-header { text-align: center; padding: 2.5rem 0 2rem; }
.site-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  color: var(--cream);
  line-height: 1.2;
  text-shadow: 0 0 40px rgba(192,56,90,.3);
}
.site-sub {
  font-size: 1rem;
  color: rgba(253,245,236,.45);
  letter-spacing: .3em;
  text-transform: uppercase;
  margin-top: .5rem;
  font-style: italic;
}
.gold-line { width: 60px; height: 1px; background: var(--gold); margin: 1.2rem auto; opacity: .5; }

/* Today card */
.today-card {
  background: linear-gradient(135deg, rgba(192,56,90,.15), rgba(212,168,75,.08));
  border: 1px solid rgba(212,168,75,.3);
  border-top: 2px solid var(--gold);
  padding: 2rem 1.8rem;
  text-align: center;
  margin-bottom: 2.5rem;
  position: relative;
  overflow: hidden;
}
.today-card::before {
  content: '✦';
  position: absolute; top: 10px; left: 14px;
  color: var(--gold); font-size: .7rem; opacity: .5;
}
.today-card::after {
  content: '✦';
  position: absolute; top: 10px; right: 14px;
  color: var(--gold); font-size: .7rem; opacity: .5;
}
.today-label {
  font-size: .7rem;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: .8;
  margin-bottom: .6rem;
  font-family: 'Cormorant Garamond', serif;
}
.today-day {
  font-family: 'Playfair Display', serif;
  font-size: 3.5rem;
  color: var(--rose);
  line-height: 1;
  margin-bottom: .3rem;
  text-shadow: 0 0 30px rgba(192,56,90,.4);
}
.today-date {
  font-size: .85rem;
  color: rgba(253,245,236,.4);
  letter-spacing: .2em;
  margin-bottom: 1.5rem;
  font-style: italic;
}
.today-reason {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(1.1rem, 3.5vw, 1.4rem);
  color: var(--cream);
  line-height: 1.65;
}
.today-heart {
  font-size: 1.5rem;
  margin-top: 1.2rem;
  animation: heartBeat 1.5s ease-in-out infinite;
}
@keyframes heartBeat {
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.15)}
}

/* Progress */
.progress-wrap { margin-bottom: 2.5rem; }
.progress-label {
  display: flex; justify-content: space-between;
  font-size: .72rem;
  color: rgba(253,245,236,.35);
  letter-spacing: .15em;
  margin-bottom: .5rem;
}
.progress-track { background: rgba(255,255,255,.06); height: 4px; border-radius: 2px; }
.progress-fill  { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); border-radius: 2px; transition: width .8s ease; }

/* Past days grid */
.section-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: rgba(253,245,236,.5);
  text-align: center;
  margin-bottom: 1.2rem;
  letter-spacing: .1em;
}

.days-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: .5rem;
  margin-bottom: 2rem;
}

.day-pill {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-size: .65rem;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
  position: relative;
}
.day-pill.past {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(212,168,75,.2);
  color: rgba(253,245,236,.5);
}
.day-pill.past:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px rgba(212,168,75,.15);
  border-color: rgba(212,168,75,.45);
}
.day-pill.today-pill {
  background: linear-gradient(135deg, rgba(192,56,90,.3), rgba(212,168,75,.15));
  border: 1px solid var(--gold);
  color: var(--gold);
  box-shadow: 0 0 16px rgba(212,168,75,.2);
}
.day-pill.future {
  background: rgba(255,255,255,.015);
  border: 1px dashed rgba(255,255,255,.06);
  color: rgba(255,255,255,.12);
  cursor: default;
}
.pill-num { font-family: 'Playfair Display', serif; font-size: .9rem; line-height: 1; }
.pill-heart { font-size: .55rem; opacity: .6; margin-top: 2px; }

/* Modal */
.modal-bg {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(5,3,4,.92);
  align-items: center; justify-content: center;
  padding: 1.5rem;
  animation: fadeIn .3s ease;
}
.modal-bg.open { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: linear-gradient(160deg, #1a0e10, #120a0c);
  border: 1px solid rgba(212,168,75,.3);
  border-top: 2px solid var(--gold);
  padding: 2.2rem 1.8rem;
  max-width: 400px;
  width: 100%;
  text-align: center;
  animation: slideUp .4s cubic-bezier(.22,1,.36,1);
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:none;opacity:1} }

.modal-day   { font-family:'Playfair Display',serif; font-size:2.5rem; color:var(--rose); line-height:1; margin-bottom:.3rem; }
.modal-date  { font-size:.8rem; color:rgba(253,245,236,.35); letter-spacing:.2em; font-style:italic; margin-bottom:1.4rem; }
.modal-text  { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(1rem,3vw,1.25rem); color:var(--cream); line-height:1.7; margin-bottom:1.5rem; }
.modal-close {
  padding:.55rem 2rem;
  border: 1px solid rgba(212,168,75,.35);
  background: transparent;
  color: rgba(212,168,75,.8);
  font-family: 'Cormorant Garamond', serif;
  font-size: .85rem;
  letter-spacing: .2em;
  cursor: pointer;
  transition: background .3s;
}
.modal-close:hover { background: rgba(212,168,75,.1); }

/* Petals */
.petal { position:fixed; pointer-events:none; z-index:50; font-size:1.2rem; opacity:0; animation:petalFall linear forwards; }
@keyframes petalFall { 0%{opacity:.9;transform:translateY(0) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(540deg)} }

// ── Render ──
function render() {
  const idx  = dayIndex();
  const today = getDate(idx);

  // Today card
  document.getElementById('todayNum').textContent    = idx + 1;
  document.getElementById('todayDate').textContent   = formatDate(today);
  document.getElementById('todayReason').textContent = reasons[idx];

  // Progress
  const pct = Math.round(((idx + 1) / 365) * 100);
  document.getElementById('progressLabel').textContent = `Jour ${idx + 1} sur 365`;
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('progressFill').style.width  = pct + '%';

  // Past title
  const pastTitle = document.getElementById('pastTitle');
  if (idx > 0) {
    pastTitle.textContent = `Les ${idx} raisons précédentes`;
  } else {
    pastTitle.textContent = 'C\'est le premier jour — bienvenue ♥';
  }

  // Grid — show all 365, colour-coded
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 365; i++) {
    const pill = document.createElement('div');
    if      (i < idx)  pill.className = 'day-pill past';
    else if (i === idx) pill.className = 'day-pill today-pill';
    else               pill.className = 'day-pill future';

    pill.innerHTML = `<span class="pill-num">${i + 1}</span><span class="pill-heart">${i <= idx ? '♥' : '·'}</span>`;

    if (i <= idx) {
      pill.addEventListener('click', () => openModal(i));
    }
    grid.appendChild(pill);
  }

  spawnPetals();
}

function openModal(i) {
  const d = getDate(i);
  document.getElementById('modalDay').textContent  = `Raison ${i + 1}`;
  document.getElementById('modalDate').textContent = formatDate(d);
  document.getElementById('modalText').textContent = reasons[i];
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalBg') || e.currentTarget.tagName === 'BUTTON') {
    document.getElementById('modalBg').classList.remove('open');
  }
}

function spawnPetals() {
  const emojis = ['🌸','✨','🌹','💕','♥'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.cssText = `left:${Math.random()*100}%;top:-30px;animation-duration:${(Math.random()*3+2).toFixed(1)}s;animation-delay:${(Math.random()*2).toFixed(1)}s;font-size:${(Math.random()*.8+.8).toFixed(1)}rem`;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

render();
